syntax = "proto3";

package warmhouse.telemetryservice.v1;

option go_package = "gen/telemetrypb";

import "google/protobuf/timestamp.proto";

// TelemetryService — gRPC API для доступа к данным телеметрии и аномалий.
// Реализуется Telemetry Service.
// Consumers: API Gateway, Monolith (на этапе миграции).
service TelemetryService {
  // Получение исторических измерений устройства.
  rpc GetMeasurements(GetMeasurementsRequest) returns (GetMeasurementsResponse);
  // Получение обнаруженных аномалий устройства.
  rpc GetAnomalies(GetAnomaliesRequest) returns (GetAnomaliesResponse);
}

message GetMeasurementsRequest {
  string device_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
  string metric = 4;          // Фильтр по типу метрики (опционально)
  string aggregation = 5;     // "none", "hourly_avg", "daily_avg"
  int32 limit = 6;
}

message MeasurementItem {
  string id = 1;
  string metric = 2;
  double value = 3;
  string unit = 4;
  google.protobuf.Timestamp recorded_at = 5;
}

message GetMeasurementsResponse {
  string device_id = 1;
  int32 count = 2;
  repeated MeasurementItem measurements = 3;
}

message GetAnomaliesRequest {
  string device_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
  string severity = 4;        // Фильтр по severity (опционально)
  string anomaly_type = 5;    // Фильтр по типу аномалии (опционально)
  int32 limit = 6;
}

message AnomalyItem {
  string id = 1;
  string metric = 2;
  double actual_value = 3;
  double expected_min = 4;
  double expected_max = 5;
  string severity = 6;
  string anomaly_type = 7;
  google.protobuf.Timestamp detected_at = 8;
  google.protobuf.Timestamp resolved_at = 9;
}

message GetAnomaliesResponse {
  string device_id = 1;
  int32 count = 2;
  repeated AnomalyItem anomalies = 3;
}
