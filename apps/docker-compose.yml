services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
    ports:
      - "10000:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: homestead
      POSTGRES_PASSWORD: secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smarthome/init.sql:/docker-entrypoint-initdb.d/01-smarthome.sql
      - ./device_service/init.sql:/docker-entrypoint-initdb.d/02-device-service.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homestead -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: smarthome-timescaledb
    ports:
      - "10001:5432"
    environment:
      POSTGRES_USER: homestead
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: telemetry
    volumes:
      - ./telemetry_service/init.sql:/docker-entrypoint-initdb.d/init.sql
      - telemetry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homestead -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smarthome-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smarthome-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smarthome-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smarthome-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic device.events --partitions 12 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic telemetry.measurements --partitions 24 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic anomaly.detected --partitions 6 --replication-factor 1
    networks:
      - smarthome-network

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  temperature-api:
    build:
      context: ./temperature_api
      dockerfile: Dockerfile
    container_name: smarthome-temperature-api
    ports:
      - "8081:8081"
    networks:
      - smarthome-network
    restart: unless-stopped

  device-service:
    build:
      context: ./device_service
      dockerfile: Dockerfile
    container_name: smarthome-device-service
    ports:
      - "8082:50051"
    environment:
      DATABASE_URL: postgres://homestead:secret@postgres:5432/device_service
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  telemetry-service:
    build:
      context: ./telemetry_service
      dockerfile: Dockerfile
    container_name: smarthome-telemetry-service
    ports:
      - "8083:50051"
    environment:
      DATABASE_URL: postgres://homestead:secret@timescaledb:5432/telemetry
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: "50051"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://homestead:secret@postgres:5432/smarthome
      TEMPERATURE_API_URL: http://temperature-api:8081
      DEVICE_SERVICE_ADDR: device-service:50051
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      temperature-api:
        condition: service_started
      device-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:
  telemetry_data:

networks:
  smarthome-network:
    driver: bridge
